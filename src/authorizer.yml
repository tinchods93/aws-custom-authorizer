authorizer:
  handler: src/handlers/authorizer.handler
  description: 'Custom Api Gateway Authorizer for Lambda functions with CORS support'
  name: ${file(resources/index.json):functions.authorizer}
  timeout: 25
  iamRoleStatementsInherit: true
  provisionedConcurrency: ${self:custom.provisionedConcurrency.${self:provider.stage}, 0}
  environment:
    VALIDATE_SCOPE_FUNCTION_NAME: ${file(resources/index.json):externalFunctions.validateScope}
    AUDIENCE: ${self:custom.config.token_providers.auth0.audience}
    TOKEN_ISSUER: ${self:custom.config.token_providers.auth0.issuer}
    JWKS_URI: ${self:custom.config.token_providers.auth0.jwks_uri} # esto proviene de auth0
