service: aws-custom-authorizer${env:developerStack, ''}

configValidationMode: off
frameworkVersion: '>=3'

custom:
  config: ${file(config/index.js)}
  stackPrefix: ${self:service}-${self:provider.stage}

  tokenSecurityPrefix: aws-token-security-${self:provider.stage}

  # Prune
  prune:
    automatic: true
    prod: 3
    develop: 1
    number: 1

provider:
  name: aws
  runtime: nodejs20.x
  architecture: arm64
  region: ${opt:region, 'us-east-1'}
  accountId: !Ref AWS::AccountId
  stage: ${opt:stage, 'develop'}
  tracing:
    lambda: true
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - 'xray:PutTraceSegments'
            - 'xray:PutTelemetryRecords'
          Resource: '*'
  environment:
    SERVICE: ${self:service}
    REGION: ${self:provider.region}
    ACCOUNT_ID: ${self:provider.accountId}
    LOG_LEVEL: INFO
    JWT_SECRET: 'test-secret'
    OWNER_PROJECT_NAME: 'Nodus'

package:
  individually: false
  excludeDevDependencies: true
  patterns:
    - '!node_modules/**'
  exclude:
    - node_modules/**

plugins:
  - serverless-iam-roles-per-function
  - serverless-prune-plugin
  - serverless-webpack

resources:
  - ${file(resources/outputs/outputs.yml)}

functions:
  - ${file(src/authorizer.yml)}
